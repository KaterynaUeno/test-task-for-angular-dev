<div class="weather-container">
  <h2>Weather</h2>

  <div class="search-bar">
    <input type="text" placeholder="Search city..." [(ngModel)]="searchInput" (keyup.enter)="search()" />
    <button (click)="search()">Search</button>
  </div>
</div>

@if(weatherStore.loading()) {
<div class="status">Loading...</div>
}

<app-block-builder [data]="weatherData()"></app-block-builder>
